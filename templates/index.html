<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESIG Hub - Eureka Socket I GMS</title>
    <!-- Local Assets -->
    <link rel="icon" type="image/png" href="/static/images/esig_hub.png">
    <script src="/static/js/tailwindcss.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/socket.io.min.js"></script>
    <script src="/static/js/app.js?v=2.0.0.1"></script>
    <script src="/static/js/alpine.min.js" defer></script>

</head>


<body x-data="app()" x-init="initws()">
    <div class="mobile-header">
        <div class="flex items-center gap-3">
            <img src="/static/images/esig_hub.png" alt="ESIG HUB" class="h-10 w-auto">
        </div>
        <button class="btn btn-outline" style="padding: 5px 10px" @click="isMenuOpen = !isMenuOpen">
            <span x-text="isMenuOpen ? 'CLOSE' : 'MENU'"></span>
        </button>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside :class="isMenuOpen ? 'open' : ''">
            <div class="sidebar-header">
                <div class="flex items-center gap-3">
                    <img src="/static/images/esig_hub.png" alt="ESIG HUB" class="h-12 w-auto">
                    <div>
                        <h1 class="text-2xl font-black mt-2 tracking-tighter text-white">ESIG HUB</h1>
                        <div class="text-[10px] text-gray-400">V3.0.0</div>
                    </div>
                </div>
            </div>

            <div class="sidebar-content">
                <!-- Service Status Overlay -->
                <div class="card-section">
                    <div class="flex justify-between items-center mb-1">
                        <span class="card-title">SYSTEM STATUS</span>
                        <span
                            :class="'badge ' + (status === 'connected' ? 'badge-success' : (status === 'disconnected' ? 'badge-danger' : 'badge-warning'))"
                            x-text="statusText"></span>
                    </div>
                    <button class="btn w-full" :class="status === 'disconnected' ? 'btn-primary' : 'btn-outline'"
                        @click="toggleConnection(); if(window.innerWidth < 1024) isMenuOpen = false"
                        x-text="status === 'disconnected' ? 'START SERVICE' : 'STOP SERVICE'">
                    </button>
                </div>

                <!-- Performance Stats (Simplified Sidebar Version) -->
                <div class="card-section">
                    <span class="card-title">CORE HEALTH</span>
                    <div class="space-y-4">
                        <div class="input-group">
                            <div class="flex justify-between text-[10px]">
                                <span class="text-gray-400">CPU</span>
                                <span class="text-green-400 font-bold" x-text="sys.cpu + '%'">-</span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar bg-green-500" :style="'width: ' + sys.cpu + '%'"></div>
                            </div>
                        </div>
                        <div class="input-group">
                            <div class="flex justify-between text-[10px]">
                                <span class="text-gray-400">RAM</span>
                                <span class="text-blue-400 font-bold" x-text="sys.ram_p + '%'">-</span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar bg-blue-500" :style="'width: ' + sys.ram_p + '%'"></div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-gray-800">
                        <button class="btn btn-outline w-full text-[10px]" @click="activeTab = 'health'">OPEN FULL
                            DASHBOARD</button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main
            style="flex: 1; display: flex; flex-direction: column; position: relative; min-height: 0; min-width: 0; overflow: hidden;"
            @click="if(window.innerWidth < 1024) isMenuOpen = false">
            <!-- Navigation Tabs & Stats -->
            <div class="stats-container" style="flex-shrink: 0;">
                <div class="flex gap-4 border-r border-gray-800 pr-4 mr-2 overflow-x-auto no-scrollbar">
                    <button class="tab-btn" :class="activeTab === 'console' ? 'active' : ''"
                        @click="activeTab = 'console'">CONSOLE</button>
                    <button class="tab-btn" :class="activeTab === 'health' ? 'active' : ''"
                        @click="activeTab = 'health'; setTimeout(() => initCharts(), 50)">HEALTH</button>
                    <button class="tab-btn" :class="activeTab === 'config' ? 'active' : ''"
                        @click="checkConfigAccess()">CONFIG ⚡</button>
                </div>
                <div class="stat-box">
                    <span class="stat-lbl">RX MSG</span>
                    <span class="stat-val text-green-400" x-text="stats.rx">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-lbl">TX MSG</span>
                    <span class="stat-val text-blue-400" x-text="stats.tx">0</span>
                </div>
                <div class="stat-box hidden-xs">
                    <span class="stat-lbl">NEXT POLL</span>
                    <span class="stat-val" x-text="countdownText">0.0s</span>
                </div>
                <div class="stat-box">
                    <span class="stat-lbl">CLIENTS</span>
                    <span class="stat-val text-orange-400" x-text="sys.client_count">0</span>
                </div>
            </div>

            <!-- Tab Content Wrapper: using flex-col instead of absolute positioning for better scrolling support -->
            <div style="flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden;">

                <!-- Tab Content: CONSOLE -->
                <div x-show="activeTab === 'console'"
                    style="flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden;">
                    {% include 'components/console_tab.html' %}
                </div>

                <!-- Tab Content: CONFIG -->
                <div x-show="activeTab === 'config'" class="tab-content-config flex flex-col lg:flex-row w-full"
                    style="flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; padding-bottom: 5rem;">

                    {% include 'components/config_tab.html' %}
                </div>

                <!-- Tab Content: HEALTH Dashboard -->
                <div x-show="activeTab === 'health'" class="tab-content-health"
                    style="display: flex; flex-direction: column; flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; padding: 1rem 2rem 5rem; background: radial-gradient(ellipse at top left, rgba(63,185,80,0.04) 0%, transparent 60%), radial-gradient(ellipse at bottom right, rgba(88,166,255,0.04) 0%, transparent 60%);">

                    {% include 'components/health_tab.html' %}
                </div>

            </div> <!-- End Tab Content Wrapper -->
        </main>
    </div>



    <footer class="fixed bottom-0 right-0 p-4 text-xs text-slate-500 opacity-50 pointer-events-none">
        ESIG HUB V3.0.0
    </footer>
</body>

</html>
