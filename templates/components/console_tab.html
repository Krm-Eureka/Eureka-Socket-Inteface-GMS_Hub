                <div class="console-top">
                    <div class="flex items-center gap-4">
                        <span class="card-title">REAL-TIME CONSOLE STREAM</span>
                        <div class="flex items-center gap-2 border-l border-gray-800 pl-4">
                            <span class="text-gray-500 uppercase tracking-tighter font-bold text-[9px]">Pending
                                Q:</span>
                            <div class="flex flex-wrap gap-1">
                                <template x-for="q in pending_q" :key="q">
                                    <span class="pending-tag !text-[9px] !py-0" x-text="q"></span>
                                </template>
                                <span x-show="pending_q.length === 0"
                                    class="text-gray-600 italic text-[9px]">None</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-outline" style="padding: 2px 10px; font-size: 0.7rem"
                        @click="allLogs = []">CLEAR LOG</button>
                </div>

                <div class="console-view flex-1" id="console-stream" style="overflow-y: auto;">
                    <template x-for="(log, index) in allLogs" :key="index">
                        <div class="log-line">
                            <div class="log-time" x-text="log.time"></div>
                            <div :class="'log-tag ' + (log.direction.toLowerCase())"
                                x-text="log.direction.toUpperCase()"></div>
                            <div class="log-type" x-text="log.msgType" @click="console.log(JSON.parse(log.payload))"
                                style="cursor:pointer; text-decoration:underline; text-decoration-style:dotted;"></div>
                            <div class="log-body" x-text="log.payload"></div>
                        </div>
                    </template>
                    <div x-show="allLogs.length === 0"
                        style="color: var(--text-muted); padding: 40px; text-align: center; opacity: 0.5">
                        ESIG HUB Console Ready. Waiting for activity...
                    </div>
                </div>
