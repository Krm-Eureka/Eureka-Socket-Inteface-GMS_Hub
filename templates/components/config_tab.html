<style>
    @media (max-width: 640px) {
        .config-editor-container {
            padding: 1rem !important;
        }
        .config-card {
            padding: 1rem !important;
        }
        .modal-content {
            padding: 1.25rem !important;
            width: 95% !important;
        }
        .preview-header {
            top: 10px !important;
            right: 15px !important;
            gap: 0.5rem !important;
        }
        .preview-name {
            font-size: 11px !important;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .zoom-controls {
            bottom: 20px !important;
            padding: 6px 15px !important;
        }
    }
</style>
<!-- FULL WIDTH: SCROLLABLE EDITOR -->
<div class="config-editor-container" style="width: 100%; padding: 1.5rem; padding-bottom: 4rem;">
    <div style="max-width:800px; margin:0 auto; width:100%;">
        <h2 style="font-size:14px; font-weight:800; color:#3fb950; margin-bottom:1.5rem; letter-spacing:.1rem;">
            ⚡ UI CONFIG EDITOR</h2>

        <!-- Password Row -->
        <div class="status-box-banner">
            <span style="font-size:11px; color:#e3b341; font-weight:700;">🔒 ADMIN PASSWORD</span>
            <input type="password" x-model="cfgPwd" placeholder="Enter admin password before saving..."
                class="config-input-modern" style="flex:1; min-width:200px;">
            <span x-show="cfgMsg" x-text="cfgMsg" :style="cfgMsgOk ? 'color:#3fb950' : 'color:#f85149'"
                style="font-size:11px; font-weight:600; min-width:120px;"></span>
        </div>

        <!-- SITE SETTINGS -->
        <div class="glass-card glass-card-green">
            <div class="glass-card-header">
                <h3 class="glass-card-title green">🏢 Site Settings</h3>
                <button class="config-btn-action btn-primary" @click="saveSiteConfig()">
                    SAVE SITE
                </button>
            </div>
            <div class="config-grid-2">
                <div class="input-group">
                    <label class="config-label-modern">SITE NAME</label>
                    <input type="text" x-model="cfgData.site.name" class="config-input-modern">
                </div>
                <div class="input-group">
                    <label class="config-label-modern">SHORT NAME</label>
                    <input type="text" x-model="cfgData.site.shortName" class="config-input-modern" style="font-family:monospace;">
                </div>
                <div class="input-group">
                    <label class="config-label-modern">PRIMARY COLOR</label>
                    <div style="display:flex; align-items:center; gap:0.75rem; margin-top:0.6rem;">
                        <input type="color"
                            :value="(cfgData.site.primaryColor || '').startsWith('#') ? cfgData.site.primaryColor : '#58a6ff'"
                            @input="cfgData.site.primaryColor = $event.target.value"
                            style="width:36px; height:36px; border:none; background:none; cursor:pointer;">
                        <input type="text" x-model="cfgData.site.primaryColor" class="config-input-modern" style="flex:1; font-family:monospace;">
                    </div>
                </div>
                <div class="input-group">
                    <label class="config-label-modern">GMS CLIENT CODE</label>
                    <input type="text" x-model="cfgData.site.gmsClientCode" class="config-input-modern" style="font-family:monospace;">
                </div>
                <div class="input-group" style="grid-column: span 2;">
                    <label class="config-label-modern">LOGO URL (OPTIONAL)</label>
                    <input type="text" x-model="cfgData.site.logoUrl" placeholder="/api/v1/ui/assets/logo.png" class="config-input-modern">
                </div>
            </div>
        </div>

        <!-- GLOBAL MAP SETTINGS -->
        <div class="glass-card glass-card-blue">
            <div class="glass-card-header">
                <h3 class="glass-card-title blue">🗺️ Global Map Settings</h3>
                <button class="config-btn-action btn-primary" @click="saveSiteConfig()">
                    SAVE MAP
                </button>
            </div>
            <div class="config-grid-2">
                <div class="input-group">
                    <label class="config-label-modern">SOCKET LOGGING</label>
                    <div style="display:flex; align-items:center; gap:0.75rem; margin-top:0.5rem;">
                        <input type="checkbox" x-model="cfgData.map.ENABLE_SOCKET_LOG" id="chk_socket_log"
                            style="width:20px; height:20px; accent-color:#3fb950; cursor:pointer;">
                        <label for="chk_socket_log"
                            style="font-size:12px; color:#c9d1d9; cursor:pointer; font-weight:600;"
                            x-text="cfgData.map.ENABLE_SOCKET_LOG ? 'ENABLED' : 'DISABLED'"></label>
                    </div>
                </div>
                <div class="input-group">
                    <label class="config-label-modern">MULTIPLIER (PX PER M)</label>
                    <input type="number" x-model.number="cfgData.map.MULTIPLIER" class="config-input-modern" style="font-family:monospace;">
                </div>
                <div class="input-group">
                    <label class="config-label-modern">SNAP DISTANCE (PX)</label>
                    <input type="number" x-model.number="cfgData.map.SNAP_DISTANCE" class="config-input-modern" style="font-family:monospace;">
                </div>
                <div class="input-group">
                    <label class="config-label-modern">ANGLE OFFSET (DEG)</label>
                    <input type="number" x-model.number="cfgData.map.ANGLE_OFFSET" class="config-input-modern" style="font-family:monospace;">
                </div>
                <div class="input-group">
                    <label class="config-label-modern">ORIGIN OFFSET X</label>
                    <input type="number" x-model.number="cfgData.map.ORIGIN_OFFSET_X" class="config-input-modern" style="font-family:monospace;">
                </div>
                <div class="input-group">
                    <label class="config-label-modern">ORIGIN OFFSET Y</label>
                    <input type="number" x-model.number="cfgData.map.ORIGIN_OFFSET_Y" class="config-input-modern" style="font-family:monospace;">
                </div>
                <div class="input-group">
                    <label class="config-label-modern">DEFAULT LOC SIZE</label>
                    <input type="number" step="0.1" x-model.number="cfgData.map.DEFAULT_LOC_SIZE" class="config-input-modern" style="font-family:monospace;">
                </div>
                <div class="input-group">
                    <label class="config-label-modern">MAP OPACITY</label>
                    <input type="number" step="0.1" x-model.number="cfgData.map.OPACITY" class="config-input-modern" style="font-family:monospace;">
                </div>
            </div>
        </div>

        <!-- ROBOT SETTINGS -->
        <div class="glass-card glass-card-orange">
            <div class="glass-card-header">
                <h3 class="glass-card-title orange">🤖 Robot Settings</h3>
                <button class="config-btn-action btn-primary" @click="saveRobotConfig()">
                    SAVE ROBOT
                </button>
            </div>
            <div class="config-grid-2" style="margin-bottom:1.5rem;">
                <div class="input-group">
                    <label class="config-label-modern">WIDTH (M)</label>
                    <input type="number" step="0.01" x-model.number="cfgData.robot.WIDTH" class="config-input-modern" style="font-family:monospace;">
                </div>
                <div class="input-group">
                    <label class="config-label-modern">LENGTH (M)</label>
                    <input type="number" step="0.01" x-model.number="cfgData.robot.LENGTH" class="config-input-modern" style="font-family:monospace;">
                </div>
                <!-- Idle Color -->
                <div class="input-group">
                    <label class="config-label-modern">IDLE COLOR</label>
                    <div style="display:flex; align-items:center; gap:0.75rem; margin-top:0.6rem;">
                        <input type="color"
                            :value="(cfgData.robot.IDLE_COLOR || '').startsWith('#') ? cfgData.robot.IDLE_COLOR : '#8b949e'"
                            @input="cfgData.robot.IDLE_COLOR = $event.target.value"
                            style="width:36px; height:36px; border:none; background:none; cursor:pointer;">
                        <input type="text" x-model="cfgData.robot.IDLE_COLOR" class="config-input-modern" style="flex:1; font-family:monospace;">
                    </div>
                </div>
                <!-- Working Color -->
                <div class="input-group">
                    <label class="config-label-modern">WORKING COLOR</label>
                    <div style="display:flex; align-items:center; gap:0.75rem; margin-top:0.6rem;">
                        <input type="color"
                            :value="(cfgData.robot.WORKING_COLOR || '').startsWith('#') ? cfgData.robot.WORKING_COLOR : '#238636'"
                            @input="cfgData.robot.WORKING_COLOR = $event.target.value"
                            style="width:36px; height:36px; border:none; background:none; cursor:pointer;">
                        <input type="text" x-model="cfgData.robot.WORKING_COLOR" class="config-input-modern" style="flex:1; font-family:monospace;">
                    </div>
                </div>
                <!-- Error Color -->
                <div class="input-group">
                    <label class="config-label-modern">ERROR COLOR</label>
                    <div style="display:flex; align-items:center; gap:0.75rem; margin-top:0.6rem;">
                        <input type="color"
                            :value="(cfgData.robot.ERROR_COLOR || '').startsWith('#') ? cfgData.robot.ERROR_COLOR : '#f85149'"
                            @input="cfgData.robot.ERROR_COLOR = $event.target.value"
                            style="width:36px; height:36px; border:none; background:none; cursor:pointer;">
                        <input type="text" x-model="cfgData.robot.ERROR_COLOR" class="config-input-modern" style="flex:1; font-family:monospace;">
                    </div>
                </div>
                <!-- Charging Color -->
                <div class="input-group">
                    <label class="config-label-modern">CHARGING COLOR</label>
                    <div style="display:flex; align-items:center; gap:0.75rem; margin-top:0.6rem;">
                        <input type="color"
                            :value="(cfgData.robot.CHARGING_COLOR || '').startsWith('#') ? cfgData.robot.CHARGING_COLOR : '#f1c40f'"
                            @input="cfgData.robot.CHARGING_COLOR = $event.target.value"
                            style="width:36px; height:36px; border:none; background:none; cursor:pointer;">
                        <input type="text" x-model="cfgData.robot.CHARGING_COLOR" class="config-input-modern" style="flex:1; font-family:monospace;">
                    </div>
                </div>
                <!-- Offline Color -->
                <div class="input-group">
                    <label class="config-label-modern">OFFLINE COLOR</label>
                    <div style="display:flex; align-items:center; gap:0.75rem; margin-top:0.6rem;">
                        <input type="color"
                            :value="(cfgData.robot.OFFLINE_COLOR || '').startsWith('#') ? cfgData.robot.OFFLINE_COLOR : '#30363d'"
                            @input="cfgData.robot.OFFLINE_COLOR = $event.target.value"
                            style="width:36px; height:36px; border:none; background:none; cursor:pointer;">
                        <input type="text" x-model="cfgData.robot.OFFLINE_COLOR" class="config-input-modern" style="flex:1; font-family:monospace;">
                    </div>
                </div>
                <!-- Label BG -->
                <div class="input-group">
                    <label class="config-label-modern">LABEL BG</label>
                    <div style="display:flex; align-items:center; gap:0.75rem; margin-top:0.6rem;">
                        <input type="color"
                            :value="(cfgData.robot.ID_LABEL_BG || '').startsWith('#') ? cfgData.robot.ID_LABEL_BG : '#161b22'"
                            @input="cfgData.robot.ID_LABEL_BG = $event.target.value"
                            style="width:36px; height:36px; border:none; background:none; cursor:pointer;">
                        <input type="text" x-model="cfgData.robot.ID_LABEL_BG" class="config-input-modern" style="flex:1; font-family:monospace;">
                    </div>
                </div>
            </div>
        </div>

        <!-- SYSTEM COLORS -->
        <div class="glass-card glass-card-blue">
            <div class="glass-card-header">
                <h3 class="glass-card-title blue">🎨 System Colors</h3>
            </div>
            <div class="config-grid-3">
                <template x-for="key in Object.keys(cfgData.colors||{})" :key="key">
                    <div class="input-group">
                        <label class="config-label-modern" x-text="key"></label>
                        <div style="display:flex; align-items:center; gap:0.5rem;">
                            <div style="position:relative; width:28px; height:28px; border-radius:6px; overflow:hidden; border:1px solid #30363d;">
                                <input type="color"
                                    :value="(cfgData.colors[key] || '').startsWith('#') ? cfgData.colors[key] : '#58a6ff'"
                                    @input="cfgData.colors[key] = $event.target.value"
                                    style="position:absolute; top:-4px; left:-4px; width:150%; height:150%; cursor:pointer; border:none; background:none; padding:0;">
                            </div>
                            <input type="text" x-model="cfgData.colors[key]" class="config-input-modern" style="flex:1; font-family:monospace; padding:6px 10px; font-size:11px;">
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- STATIONS -->
        <div class="glass-card">
            <div class="glass-card-header">
                <h3 class="glass-card-title">🚩 Stations (<span x-text="Object.keys(cfgData.stations||{}).length">0</span>)</h3>
                <button class="config-btn-action btn-primary"
                    @click="editStationCode='';newStation={code:'',alias:'',pairs:[{type:'',angle:0}]};showAddStation=true">+ ADD</button>
            </div>
            <div style="max-height:280px; overflow-y:auto;">
                <table class="config-table">
                    <thead>
                        <tr>
                            <th>CODE</th>
                            <th>ALIAS</th>
                            <th>CONFIG (TYPE : ANGLE)</th>
                            <th style="text-align:center;">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="[code, st] in Object.entries(cfgData.stations||{})" :key="code">
                            <tr>
                                <td style="color:#c9d1d9;font-weight:700;font-family:monospace;" x-text="code"></td>
                                <td x-text="st.alias"></td>
                                <td style="font-size:10px;color:#e3b341;font-family:monospace;" x-text="st.containerCfg ? Object.entries(st.containerCfg).map(([k,v])=>`${k}:${v}`).join(', ') : '-'"></td>
                                <td style="text-align:center;">
                                    <button class="badge-blue" style="cursor:pointer;margin-right:4px;"
                                        @click="
                                            editStationCode=code;
                                            let pList = [];
                                            if (st.containerCfg) {
                                                Object.entries(st.containerCfg).forEach(([t, ang]) => {
                                                    pList.push({ type: t, angle: ang });
                                                });
                                            }
                                            if(pList.length === 0) pList = [{type:'', angle:0}];
                                            newStation={code:code, oldCode:code, alias:st.alias, pairs:pList};
                                            showAddStation=true
                                        ">EDIT</button>
                                    <button class="badge-red" style="cursor:pointer;"
                                        @click="deleteStation(code)">DEL</button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            <!-- Add/Edit Station Modal -->
            <div x-show="showAddStation" x-cloak @keydown.escape.window="showAddStation=false" class="modal-backdrop">
                <div class="modal-glass">
                    <h3 class="glass-card-title" x-text="editStationCode ? 'EDIT: '+editStationCode : 'ADD STATION'"></h3>
                    <div style="display:grid;gap:.75rem;margin-top:1.5rem;">
                        <div>
                            <label class="config-label-modern">STATION CODE *</label>
                            <input x-model="newStation.code" placeholder="e.g. B3F1_3_IN" class="config-input-modern" style="font-family:monospace;">
                        </div>
                        <div>
                            <label class="config-label-modern">ALIAS *</label>
                            <input x-model="newStation.alias" placeholder="e.g. B3F1" class="config-input-modern">
                        </div>
                        <div>
                            <label class="config-label-modern">CONTAINER TYPE & ANGLE CONFIG</label>
                            <div style="display:flex; flex-direction:column; gap:0.5rem; margin-top:0.5rem;">
                                <template x-for="(pair, index) in newStation.pairs" :key="index">
                                    <div style="display:flex; gap:0.5rem; align-items:center;">
                                        <input x-model="pair.type" placeholder="Type (e.g. T2000001)" class="config-input-modern" style="flex:2; font-family:monospace; font-size:11px;">
                                        <div style="color:#8b949e;">:</div>
                                        <input type="number" x-model.number="pair.angle" placeholder="Angle" class="config-input-modern" style="flex:1; font-family:monospace; font-size:11px; text-align:center;">
                                        <button @click="$data.removePair(index)" class="text-red-500 hover:text-red-400 p-1" style="flex-shrink:0;">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                            </svg>
                                        </button>
                                    </div>
                                </template>
                            </div>
                            <button @click="$data.addPair()" class="btn btn-outline w-full mt-3" style="padding:4px; font-size:10px; border-style:dashed; border-color:#30363d;">
                                + ADD CONTAINER TYPE
                            </button>
                            <p style="font-size:9px; color:#8b949e; margin-top:8px;">* The first entry's angle will be used as the default fallback.</p>
                        </div>
                    </div>
                    <div style="display:flex;justify-content:flex-end;gap:.75rem;margin-top:1.5rem;">
                        <button class="config-btn-action btn-outline" @click="showAddStation=false">CANCEL</button>
                        <button class="config-btn-action btn-primary" @click="saveStation()">SAVE</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- FLOORS -->
        <div class="glass-card">
            <div class="glass-card-header">
                <h3 class="glass-card-title">🏗️ Floors (<span x-text="(cfgData.floors||[]).length"></span>)</h3>
                <button class="config-btn-action btn-primary"
                    @click="editFloorId=null;newFloor={id:'',label:'',image:'',_file:null};showAddFloor=true">+ ADD</button>
            </div>
            <div class="config-grid-2">
                <template x-for="f in (cfgData.floors||[])" :key="f.id">
                    <div @mouseenter="activePreviewImg = f.image; activePreviewName = 'Map: ' + f.label"
                        class="mini-stat" style="cursor: pointer;"
                        :style="activePreviewImg === f.image ? 'border-color: var(--accent-green)' : ''">
                        <div style="font-size:12px;font-weight:700;color:#c9d1d9;" x-text="f.label"></div>
                        <div style="font-size:10px;color:#6e7681;font-family:monospace;" x-text="'ID: '+f.id"></div>
                        <img :src="f.image+'?t='+Date.now()"
                            style="width:100%;height:70px;object-fit:cover;border-radius:6px;opacity:.7;margin-top:.5rem;cursor:zoom-in;"
                            @click="activePreviewImg=f.image; activePreviewName='Map: '+f.label; showPreviewModal=true; resetZoom();"
                            onerror="this.style.display='none'">
                        <div style="display:flex; gap:4px; margin-top:.5rem;">
                            <button class="badge-blue" style="flex:1; cursor:pointer;"
                                @click="editFloorId=f.id; newFloor={id:f.id, label:f.label, image:f.image, _file:null}; showAddFloor=true">EDIT</button>
                            <button class="badge-red" style="flex:1; cursor:pointer;"
                                @click="deleteFloor(f.id)">DEL</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- CONTAINER TYPES -->
        <div class="glass-card">
            <div class="glass-card-header">
                <h3 class="glass-card-title">📦 Container Types (<span x-text="(cfgData.containerTypes||[]).length">0</span>)</h3>
                <button class="config-btn-action btn-primary"
                    @click="editContainerId=null;newContainer={id:'',name:'',width:0.8,length:1.2,color:'#238636',image:'',_file:null};showAddContainer=true">+ ADD</button>
            </div>
            <div class="config-grid-2">
                <template x-for="ct in (cfgData.containerTypes||[])" :key="ct.id">
                    <div @mouseenter="activePreviewImg = ct.image; activePreviewName = 'Icon: ' + ct.name"
                        class="mini-stat" style="cursor: pointer;"
                        :style="activePreviewImg === ct.image ? 'border-color: var(--accent-blue)' : ''">
                        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;">
                            <div :style="'width:10px;height:10px;border-radius:50%;background:'+ct.color"></div>
                            <span style="font-size:11px;font-weight:700;color:#c9d1d9;" x-text="ct.name"></span>
                        </div>
                        <div style="font-size:10px;color:var(--text-muted);font-family:monospace;" x-text="ct.id"></div>
                        <div style="font-size:10px;color:var(--text-muted);" x-text="ct.width+'m × '+ct.length+'m'"></div>
                        <img :src="ct.image+'?t='+Date.now()"
                            style="width:100%;height:60px;object-fit:contain;margin-top:.5rem;cursor:zoom-in;"
                            @click="activePreviewImg=ct.image; activePreviewName='Icon: '+ct.name; showPreviewModal=true; resetZoom();"
                            onerror="this.style.display='none'">
                        <div style="display:flex; gap:4px; margin-top:.5rem;">
                            <button class="badge-blue" style="flex:1; cursor:pointer;"
                                @click="editContainerId=ct.id; newContainer={id:ct.id, name:ct.name, width:ct.width, length:ct.length, color:ct.color, image:ct.image, _file:null}; showAddContainer=true">EDIT</button>
                            <button class="badge-red" style="flex:1; cursor:pointer;"
                                @click="deleteContainerType(ct.id)">DEL</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>

<!-- ═══ MODALS (Outside glass-card stacking context) ═══ -->

<!-- Add/Edit Floor Modal -->
<div x-show="showAddFloor" x-cloak @keydown.escape.window="showAddFloor=false" class="modal-backdrop">
    <div class="modal-glass">
        <h3 class="glass-card-title" x-text="editFloorId !== null ? 'EDIT FLOOR: ' + editFloorId : 'ADD NEW FLOOR'"></h3>
        <div style="display:grid;gap:.75rem;margin-top:1.5rem;">
            <div>
                <label class="config-label-modern">FLOOR ID (Positive Integer) *</label>
                <input type="number" min="0" step="1" x-model.number="newFloor.id" placeholder="4" class="config-input-modern">
            </div>
            <div>
                <label class="config-label-modern">LABEL *</label>
                <input x-model="newFloor.label" placeholder="FLOOR 4" class="config-input-modern">
            </div>
            <div>
                <label class="config-label-modern">FLOOR IMAGE (.webp/.png) *</label>
                <input type="file" accept=".webp,.png,.jpg,.jpeg"
                    @change="newFloor._file=$event.target.files[0];newFloor._filename=$event.target.files[0]?.name"
                    style="width:100%;color:#c9d1d9;font-size:11px;margin-top:4px;">
                <div style="margin-top:10px; border:1px solid #30363d; border-radius:8px; overflow:hidden; background:rgba(0,0,0,0.2); height:100px; display:flex; align-items:center; justify-content:center;">
                    <template x-if="newFloor.image || newFloor._file">
                        <img :src="newFloor._file ? URL.createObjectURL(newFloor._file) : (newFloor.image + '?t=' + Date.now())"
                            style="max-width:100%; max-height:100%; object-fit:contain;">
                    </template>
                    <template x-if="!newFloor.image && !newFloor._file">
                        <div style="color:#484f58; font-size:10px;">NO IMAGE SELECTED</div>
                    </template>
                </div>
                <div x-show="newFloor._filename" x-text="'✅ New file: '+newFloor._filename"
                    style="font-size:10px;color:#3fb950;margin-top:4px;"></div>
            </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:.75rem;margin-top:1.5rem;">
            <button class="config-btn-action btn-outline" @click="showAddFloor=false">CANCEL</button>
            <button class="config-btn-action btn-primary" @click="saveFloor()">SAVE</button>
        </div>
    </div>
</div>

<!-- Add/Edit Container Modal -->
<div x-show="showAddContainer" x-cloak @keydown.escape.window="showAddContainer=false" class="modal-backdrop">
    <div class="modal-glass">
        <h3 class="glass-card-title" x-text="editContainerId !== null ? 'EDIT CONTAINER: ' + editContainerId : 'ADD NEW CONTAINER'"></h3>
        <div style="display:grid;gap:.75rem;margin-top:1.5rem;">
            <div>
                <label class="config-label-modern">CONTAINER ID *</label>
                <input x-model="newContainer.id" placeholder="e.g. T2000001" class="config-input-modern" style="font-family:monospace;">
            </div>
            <div>
                <label class="config-label-modern">NAME *</label>
                <input x-model="newContainer.name" placeholder="e.g. Tray 2000" class="config-input-modern">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                <div>
                    <label class="config-label-modern">WIDTH (M) *</label>
                    <input type="number" step="0.001" x-model.number="newContainer.width" placeholder="0.4" class="config-input-modern">
                </div>
                <div>
                    <label class="config-label-modern">LENGTH (M) *</label>
                    <input type="number" step="0.001" x-model.number="newContainer.length" placeholder="0.6" class="config-input-modern">
                </div>
            </div>
            <div>
                <label class="config-label-modern">THEME COLOR</label>
                <div style="display:flex; align-items:center; gap:0.75rem; margin-top:0.6rem;">
                    <input type="color" x-model="newContainer.color" style="width:36px;height:36px;border:none;background:none;cursor:pointer;">
                    <input type="text" x-model="newContainer.color" class="config-input-modern" style="flex:1; font-family:monospace; font-size:11px;">
                </div>
            </div>
            <div>
                <label class="config-label-modern">ICON IMAGE (.webp/.png/svg) *</label>
                <input type="file" accept=".webp,.png,.jpg,.jpeg,.svg"
                    @change="newContainer._file=$event.target.files[0];newContainer._filename=$event.target.files[0]?.name"
                    style="width:100%;color:#c9d1d9;font-size:11px;margin-top:4px;">
                <div style="margin-top:10px; border:1px solid #30363d; border-radius:8px; overflow:hidden; background:rgba(0,0,0,0.2); height:80px; display:flex; align-items:center; justify-content:center;">
                    <template x-if="newContainer.image || newContainer._file">
                        <img :src="newContainer._file ? URL.createObjectURL(newContainer._file) : (newContainer.image + '?t=' + Date.now())"
                            style="max-width:80%; max-height:80%; object-fit:contain;">
                    </template>
                </div>
            </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:.75rem;margin-top:1.5rem;">
            <button class="config-btn-action btn-outline" @click="showAddContainer=false">CANCEL</button>
            <button class="config-btn-action btn-primary" @click="saveContainerType()">SAVE</button>
        </div>
    </div>
</div>


<!-- FULLSCREEN PREVIEW MODAL -->
<div x-show="showPreviewModal" x-cloak @keydown.escape.window="showPreviewModal=false; resetZoom()"
    class="modal-backdrop" style="background:rgba(0,0,0,0.92); backdrop-filter:blur(15px);">

    <div style="position:absolute; top:20px; right:30px; display:flex; gap:1rem; align-items:center; z-index:10001;">
        <span class="badge-blue" style="font-size:12px; padding:6px 16px; border-radius:20px;" x-text="activePreviewName"></span>
        <button @click="showPreviewModal=false; resetZoom()"
            style="background:var(--accent-red); color:white; border:none; width:40px; height:40px; border-radius:50%; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 0 20px rgba(248,81,73,0.4);">&times;</button>
    </div>

    <!-- ZOOM CONTROLS -->
    <div style="position:absolute; bottom:40px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:1rem; background:rgba(22,27,34,0.8); padding:10px 24px; border-radius:40px; border:1px solid rgba(255,255,255,0.1); z-index:10001; backdrop-filter:blur(10px); box-shadow:0 10px 40px rgba(0,0,0,0.6);">
        <button @click="zoomOut()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer; width:30px;">−</button>
        <div style="color:white; font-family:monospace; font-size:14px; min-width:60px; text-align:center; font-weight:700;" x-text="Math.round(zoomLevel * 100) + '%'"></div>
        <button @click="zoomIn()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer; width:30px;">+</button>
        <div style="width:1px; height:20px; background:rgba(255,255,255,0.1); margin:0 8px;"></div>
        <button @click="resetZoom()" style="background:none; border:none; color:var(--accent-blue); font-size:12px; font-weight:800; cursor:pointer; text-transform:uppercase;">RESET</button>
    </div>

    <!-- PANNING CONTAINER -->
    <div style="width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; z-index:10000; cursor: default;"
        @mousedown.self="showPreviewModal=false; resetZoom()" @mousemove.window="doPan($event)"
        @mouseup.window="endPan()" @mouseleave.window="endPan()" @touchstart.self="showPreviewModal=false; resetZoom()"
        @touchmove.window="doPan($event)" @touchend.window="endPan()"
        @wheel.prevent="if($event.deltaY < 0) zoomIn(); else zoomOut();">
        <img :src="activePreviewImg + '?t=' + Date.now()"
            :style="'transform: translate(' + pan.offX + 'px, ' + pan.offY + 'px) scale(' + zoomLevel + '); transition: ' + (pan.active ? 'none' : 'transform 0.25s cubic-bezier(0.2, 0, 0.2, 1)') + '; max-width:90%; max-height:90%; object-fit:contain; border-radius:12px; box-shadow:0 30px 90px rgba(0,0,0,0.9); cursor: ' + (zoomLevel > 1 ? (pan.active ? 'grabbing' : 'grab') : 'default') + '; transform-origin: center;'"
            @mousedown.prevent="startPan($event)" @touchstart.prevent="startPan($event)" @click.stop draggable="false">
    </div>
</div>
